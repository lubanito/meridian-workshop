name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          # Opus 4.7 + max thinking budget so the review reasons over the
          # full PR rather than skimming. The top-level `model:` input is
          # silently ignored by this action — model + thinking-budget go
          # via claude_args (the underlying Claude Code CLI flags).
          claude_args: >-
            --model claude-opus-4-7
            --max-thinking-tokens 32000
            --allowedTools
            mcp__github__get_pull_request,mcp__github__get_pull_request_files,mcp__github__get_pull_request_diff,mcp__github__list_pull_request_files,Bash
          prompt: |
            Review PR #${{ github.event.pull_request.number }} in ${{ github.repository }}.
            1. Call mcp__github__get_pull_request with owner="${{ github.event.repository.owner.login }}", repo="${{ github.event.repository.name }}", pull_number=${{ github.event.pull_request.number }} to read the PR.
            2. Call mcp__github__get_pull_request_files with the same args to see changed files.
            3. Analyze the changes for bugs, security issues, and Vue 3 best practices.
            4. Run this Bash command to post your review:
               gh pr comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --body "## Claude Code Review\n\n<your review here>"
