name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review PR #${{ github.event.pull_request.number }} in ${{ github.repository }}.

            1. Use gh or the GitHub API to fetch the diff for this PR.
            2. Review the changed files for bugs, security issues, Vue 3 best practices, API design, and test coverage.
            3. Post your findings as a PR review comment using the GitHub API (POST /repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews).

            Be specific and concise. Flag real issues, not style preferences.
