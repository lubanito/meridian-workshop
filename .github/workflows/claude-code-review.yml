name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          prompt: |
            Review PR #${{ github.event.pull_request.number }} in ${{ github.repository }}.
            Run: gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }}
            Analyze the diff for bugs, security issues, and Vue 3 best practices.
            Then run: gh pr review ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --comment --body "YOUR REVIEW HERE"
